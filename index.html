<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#070708">
  <meta name="description" content="A full-screen, system-audio music visualizer.">
  <link rel="icon" href="data:,">
  <title>Music Visualization</title>
  <link rel="stylesheet" href="./styles.css">
  <script type="module" src="./app.js"></script>
</head>
<body>
  <main>
    <canvas id="visualizer" aria-label="Live system-audio visualization"></canvas>

    <button id="startButton" class="audio-gate" type="button">
      <strong>START SYSTEM AUDIO</strong>
      <span>Choose a screen and enable system audio</span>
    </button>

    <p id="status" class="status" role="status" aria-live="polite"></p>
  </main>

  <noscript>This visualizer needs JavaScript.</noscript>
</body>
</html>
