name: Desktop builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            arch: x64
            artifact: windows-x64
            files: release/*.exe
          - name: Linux x64
            os: ubuntu-latest
            arch: x64
            artifact: linux-x64
            files: release/*.AppImage
          - name: macOS Apple Silicon
            os: macos-15
            arch: arm64
            artifact: macos-arm64
            files: release/*.dmg
          - name: macOS Intel
            os: macos-15-intel
            arch: x64
            artifact: macos-x64
            files: release/*.dmg

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up .NET
        if: runner.os == 'Windows'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build installer
        run: npm run electron:build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload installer
        uses: actions/upload-artifact@v6
        with:
          name: music-visualization-${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download installers
        uses: actions/download-artifact@v7
        with:
          pattern: music-visualization-*
          path: release-files
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: gh release create "$RELEASE_TAG" release-files/* --verify-tag --generate-notes --title "Music Visualization $RELEASE_TAG"
